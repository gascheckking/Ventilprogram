<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ventilprogram 2026 - Botkyrka VA</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #e9f0f5;
            margin: 0;
            padding: 20px;
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 24px 32px 24px;
        }
        h1 {
            font-size: 1.7rem;
            margin: 0 0 6px 0;
            color: #1a4d6b;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .year-badge {
            background: #ff9800;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .sub {
            color: #2c6979;
            border-left: 4px solid #2c9c6e;
            padding-left: 16px;
            margin: 8px 0 20px 0;
            font-weight: 500;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: #f4f9fe;
            padding: 16px;
            border-radius: 20px;
            align-items: flex-end;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1 1 160px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c5a74;
        }
        input, textarea, select {
            padding: 10px 12px;
            border: 1px solid #cbdbe2;
            border-radius: 16px;
            font-size: 0.9rem;
            background: white;
            transition: 0.15s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2c9c6e;
            box-shadow: 0 0 0 2px rgba(44,156,110,0.2);
        }
        button {
            background: #1e6f5c;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background: #0f5545;
            transform: scale(0.97);
        }
        .btn-outline {
            background: white;
            border: 1px solid #1e6f5c;
            color: #1e6f5c;
        }
        .btn-outline:hover {
            background: #e0f0ec;
            transform: none;
        }
        .btn-warning {
            background: #e67e22;
        }
        .btn-warning:hover {
            background: #d35400;
        }
        .stats {
            background: #eef3f0;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
            margin-top: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1100px;
        }
        th {
            text-align: left;
            padding: 12px 10px;
            background-color: #f1f7fc;
            position: sticky;
            top: 0;
            font-weight: 600;
            color: #1e4663;
            border-bottom: 2px solid #cfdfed;
        }
        td {
            padding: 10px 10px;
            border-bottom: 1px solid #e9edf2;
            vertical-align: top;
        }
        tr:hover {
            background-color: #fafefb;
        }
        .ventil-nr {
            font-weight: 700;
            font-family: monospace;
            font-size: 0.85rem;
            background: #eef2fa;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .area-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .area-Tullinge { background: #d1e7dd; color: #0a5e3a; }
        .area-Tumba { background: #fff3cd; color: #856404; }
        .area-Vårsta { background: #d1ecf1; color: #0c5460; }
        .area-Grödinge { background: #e2d5f1; color: #4a2c6d; }
        .area-Fittja { background: #f8d7da; color: #721c24; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 2px 0;
        }
        .insats-badge {
            background: #ff9800;
            color: white;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 6px;
        }
        .extra-badge {
            background: #e1d5e7;
            color: #4a2c6d;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 16px;
            display: inline-block;
            margin: 2px 4px 2px 0;
        }
        .action-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 20px;
        }
        .edit-btn:hover { background: #e0eefa; }
        .delete-btn:hover { background: #ffe6e6; color: #b13e3e; }
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #6c86a3;
            font-style: italic;
        }
        .manual-status {
            background: #fff8e7;
            border-left: 3px solid #ff9800;
            padding: 8px;
            margin-top: 8px;
            border-radius: 12px;
        }
        footer {
            margin-top: 20px;
            text-align: right;
            font-size: 0.7rem;
            color: #8aa0b5;
        }
        @media (max-width: 800px) {
            body { padding: 12px; }
            .app-container { padding: 16px; }
            .toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>
        🧰 Ventilprogram 2026 · Botkyrka VA
        <span class="year-badge">📅 Pågående inventering</span>
    </h1>
    <div class="sub">🔧 Huvudventiler – Status, defekter & extra fynd</div>

    <!-- HUVUDFORMULÄR -->
    <div class="toolbar" id="formPanel">
        <div class="input-group">
            <label>🏷️ Ventilnummer</label>
            <input type="text" id="ventilId" placeholder="VAV92323" autocomplete="off">
        </div>
        <div class="input-group">
            <label>📍 Område</label>
            <select id="area">
                <option value="Tullinge">Tullinge</option>
                <option value="Tumba">Tumba</option>
                <option value="Vårsta">Vårsta</option>
                <option value="Grödinge">Grödinge</option>
                <option value="Fittja/Alby/Norsborg/Slagsta">Fittja/Alby/Norsborg/Slagsta</option>
            </select>
        </div>
        <div class="input-group">
            <label>📍 Specifik plats / gata</label>
            <input type="text" id="location" placeholder="Korsning Oxelvägen / Askvägen">
        </div>
        <div class="input-group">
            <label>⚠️ Status (välj eller skriv eget)</label>
            <select id="statusSelect">
                <option value="Trasig - snurrar bara">🔴 Trasig - snurrar bara</option>
                <option value="Trasig - stum, kan ej rubba (provat med 2 gubbar)">🔴 Trasig - stum, kan ej rubba (provat med 2 gubbar)</option>
                <option value="Väldigt trög, måste vara 2 gubbar">🟠 Väldigt trög, måste vara 2 gubbar</option>
                <option value="Måste asfalteras om">🟡 Måste asfalteras om</option>
                <option value="Betäckning trasig - Byta lock">🟡 Betäckning trasig - Byta lock</option>
                <option value="Betäckning trasig - Måste höja hela betäckning">🟡 Betäckning trasig - Måste höja hela betäckning</option>
                <option value="Måste grävas - Skapad insats: JA">🟠 Måste grävas - Skapad insats: JA</option>
                <option value="Måste grävas - Skapad insats: NEJ">🟠 Måste grävas - Skapad insats: NEJ</option>
                <option value="Hittar ej ventil">⚪ Hittar ej ventil</option>
                <option value="Funktionskontroll OK">🟢 Funktionskontroll OK</option>
                <option value="(Egen text)">✏️ (Egen text)</option>
            </select>
        </div>
        <div class="input-group" id="manualStatusGroup" style="display:none;">
            <label>✏️ Skriv egen status</label>
            <input type="text" id="manualStatus" placeholder="Ange egen statusbeskrivning...">
        </div>
        <div class="input-group" style="flex:2;">
            <label>📝 Övrig notering / detaljer</label>
            <textarea id="defectDesc" rows="1" placeholder="Fler detaljer om ventilen..."></textarea>
        </div>
        <div class="input-group">
            <label>⚙️ Åtgärd</label>
            <select id="actionStatus">
                <option value="Ej åtgärdad">⚠️ Ej åtgärdad</option>
                <option value="Planerad">📅 Planerad</option>
                <option value="Pågående">🔧 Pågående</option>
                <option value="Åtgärdad">✅ Åtgärdad</option>
            </select>
        </div>
        <div style="display: flex; gap: 8px;">
            <button id="saveBtn">💾 Spara ventil</button>
            <button id="clearFormBtn" type="button" class="btn-outline">🗑️ Rensa</button>
        </div>
    </div>

    <!-- EXTRA FYND -->
    <div class="toolbar" style="background: #fef7e0; margin-top: -8px;">
        <div class="input-group" style="flex:3;">
            <label>🪣 EXTRA FYND (brandpost, brunn, asfalt, kantsten etc)</label>
            <input type="text" id="extraFind" placeholder="Ex: Brandpost behöver höjas / Asfaltskada / Kantsten trasig">
        </div>
        <button id="addExtraBtn" class="btn-outline">➕ Lägg till extrafynd</button>
    </div>

    <!-- SÖK & FILTER -->
    <div class="toolbar" style="background: white; padding: 8px 0 0 0; flex-wrap: wrap;">
        <div class="input-group search-box" style="flex:2;">
            <label>🔍 Sök (ventilnr, plats, status, extrafynd)</label>
            <input type="text" id="searchInput" placeholder="Sök...">
        </div>
        <div class="input-group" style="flex:1;">
            <label>📌 Filtrera på område</label>
            <select id="areaFilter">
                <option value="">Alla områden</option>
                <option value="Tullinge">Tullinge</option>
                <option value="Tumba">Tumba</option>
                <option value="Vårsta">Vårsta</option>
                <option value="Grödinge">Grödinge</option>
                <option value="Fittja/Alby/Norsborg/Slagsta">Fittja/Alby/Norsborg/Slagsta</option>
            </select>
        </div>
        <div style="display: flex; gap: 8px; align-items: flex-end;">
            <button id="exportCsvBtn" class="btn-outline">📎 Exportera CSV</button>
            <button id="importExampleBtn" class="btn-outline">📋 Exempeldata</button>
        </div>
    </div>

    <!-- STATISTIK -->
    <div class="stats" id="statsCounter">0 ventiler</div>

    <!-- TABELL -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Ventilnr</th><th>Område</th><th>Plats</th><th>Status</th><th>Notering</th><th>Extra fynd</th><th>Åtgärd</th><th></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="empty-row"><td colspan="8">➕ Lägg till ventil via formuläret ovan</td></tr>
            </tbody>
        </table>
    </div>
    <footer>💾 Sparas automatiskt i webbläsaren | Fungerar offline | Ventilprogram 2026 Botkyrka</footer>
</div>

<script>
    let ventilData = [];
    let currentSearchTerm = "";
    let currentAreaFilter = "";

    function loadFromStorage() {
        const stored = localStorage.getItem("ventilprogram2026_botkyrka");
        if(stored) {
            try {
                ventilData = JSON.parse(stored);
            } catch(e) { ventilData = []; }
        } else {
            ventilData = [
                { id: "1", ventilNr: "VAV92323", area: "Tullinge", location: "Oxelvägen / Askvägen", status: "Trasig - snurrar bara", defectDesc: "Spindeln roterar fritt, inget motstånd", extraFinds: ["Brandpost behöver höjas"], actionStatus: "Ej åtgärdad", lastUpdated: new Date().toISOString() },
                { id: "2", ventilNr: "VAV87112", area: "Tumba", location: "Granitvägen 12", status: "Väldigt trög, måste vara 2 gubbar", defectDesc: "Går tungt, smörjning behövs", extraFinds: [], actionStatus: "Planerad", lastUpdated: new Date().toISOString() },
                { id: "3", ventilNr: "VAV44509", area: "Grödinge", location: "Björkhagsleden", status: "Funktionskontroll OK", defectDesc: "Inga anmärkningar", extraFinds: [], actionStatus: "Åtgärdad", lastUpdated: new Date().toISOString() },
                { id: "4", ventilNr: "VAV10101", area: "Fittja/Alby/Norsborg/Slagsta", location: "Fittja centrum", status: "Måste grävas - Skapad insats: JA", defectDesc: "Ventilen går ej att nå, behöver grävas fram", extraFinds: ["Asfaltskada vid brunn"], actionStatus: "Pågående", lastUpdated: new Date().toISOString() }
            ];
        }
        renderTable();
        updateStats();
        saveToStorage();
    }

    function saveToStorage() {
        localStorage.setItem("ventilprogram2026_botkyrka", JSON.stringify(ventilData));
    }

    function updateStats() {
        const total = ventilData.length;
        const pending = ventilData.filter(v => v.actionStatus === "Ej åtgärdad").length;
        const byArea = {};
        ventilData.forEach(v => { byArea[v.area] = (byArea[v.area] || 0) + 1; });
        const areaText = Object.entries(byArea).map(([a,c]) => `${a}:${c}`).join(" · ");
        document.getElementById("statsCounter").innerHTML = `📊 Totalt: ${total} ventiler | ⚠️ Ej åtgärdade: ${pending} | ${areaText}`;
    }

    function getAreaClass(area) {
        if(area.includes("Tullinge")) return "area-Tullinge";
        if(area.includes("Tumba")) return "area-Tumba";
        if(area.includes("Vårsta")) return "area-Vårsta";
        if(area.includes("Grödinge")) return "area-Grödinge";
        return "area-Fittja";
    }

    function getStatusColor(status) {
        if(status.includes("Trasig")) return "#ffcdd2";
        if(status.includes("trög") || status.includes("Trög")) return "#ffecb3";
        if(status.includes("asfaltera") || status.includes("Betäckning")) return "#ffe0b2";
        if(status.includes("grävas")) return "#ffccbc";
        if(status.includes("Hittar ej")) return "#e0e0e0";
        if(status.includes("OK")) return "#c8e6d9";
        return "#e3f2fd";
    }

    function renderTable() {
        const tbody = document.getElementById("tableBody");
        let filtered = ventilData.filter(v => {
            const matchSearch = !currentSearchTerm || 
                v.ventilNr.toLowerCase().includes(currentSearchTerm) ||
                (v.location && v.location.toLowerCase().includes(currentSearchTerm)) ||
                v.status.toLowerCase().includes(currentSearchTerm) ||
                (v.defectDesc && v.defectDesc.toLowerCase().includes(currentSearchTerm)) ||
                (v.extraFinds && v.extraFinds.some(ef => ef.toLowerCase().includes(currentSearchTerm)));
            const matchArea = !currentAreaFilter || v.area === currentAreaFilter;
            return matchSearch && matchArea;
        });

        if(filtered.length === 0) {
            tbody.innerHTML = `<tr class="empty-row"><td colspan="8">🔎 Ingen ventil matchar sökningen</td></tr>`;
            return;
        }

        tbody.innerHTML = "";
        for(let vent of filtered) {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = `<span class="ventil-nr">${escapeHtml(vent.ventilNr)}</span>`;
            row.insertCell(1).innerHTML = `<span class="area-badge ${getAreaClass(vent.area)}">${escapeHtml(vent.area)}</span>`;
            row.insertCell(2).innerHTML = escapeHtml(vent.location || '—');
            
            const statusCell = row.insertCell(3);
            const hasInsats = vent.status.includes("Skapad insats");
            statusCell.innerHTML = `<span class="status-badge" style="background:${getStatusColor(vent.status)}">${escapeHtml(vent.status)}</span>${hasInsats ? '<span class="insats-badge">📋 Insats skapad</span>' : ''}`;
            
            row.insertCell(4).innerHTML = `<div style="white-space:pre-wrap; max-width:250px;">${escapeHtml(vent.defectDesc || '—')}</div>`;
            
            const extraCell = row.insertCell(5);
            if(vent.extraFinds && vent.extraFinds.length > 0) {
                extraCell.innerHTML = vent.extraFinds.map(ef => `<div class="extra-badge">🪣 ${escapeHtml(ef)}</div>`).join('');
            } else { extraCell.innerHTML = '—'; }
            
            let actionBg = vent.actionStatus === "Åtgärdad" ? "#c8e6d9" : (vent.actionStatus === "Pågående" ? "#ffe0b2" : "#ffcdd2");
            row.insertCell(6).innerHTML = `<span style="background:${actionBg}; padding:4px 10px; border-radius:20px; font-size:0.7rem;">${escapeHtml(vent.actionStatus)}</span>`;
            
            const actionCell = row.insertCell(7);
            actionCell.className = "action-icons";
            actionCell.innerHTML = `
                <button class="edit-btn" data-id="${vent.id}" title="Redigera">✏️</button>
                <button class="delete-btn" data-id="${vent.id}" title="Ta bort">🗑️</button>
            `;
        }

        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => editVentilById(btn.getAttribute('data-id'))));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => deleteVentilById(btn.getAttribute('data-id'))));
    }

    function getSelectedStatus() {
        const select = document.getElementById("statusSelect");
        if(select.value === "(Egen text)") {
            const manual = document.getElementById("manualStatus").value.trim();
            return manual || "(Egen text ej ifylld)";
        }
        return select.value;
    }

    document.getElementById("statusSelect").addEventListener("change", function() {
        const manualGroup = document.getElementById("manualStatusGroup");
        if(this.value === "(Egen text)") {
            manualGroup.style.display = "flex";
        } else {
            manualGroup.style.display = "none";
        }
    });

    function saveVentil() {
        const ventilNr = document.getElementById("ventilId").value.trim();
        if(!ventilNr) { alert("Ange ventilnummer"); return; }
        
        const area = document.getElementById("area").value;
        const location = document.getElementById("location").value.trim();
        const status = getSelectedStatus();
        const defectDesc = document.getElementById("defectDesc").value.trim();
        const actionStatus = document.getElementById("actionStatus").value;
        
        const editId = document.getElementById("saveBtn").getAttribute("data-edit-id");
        
        if(editId) {
            const idx = ventilData.findIndex(v => v.id === editId);
            if(idx !== -1) {
                ventilData[idx] = { ...ventilData[idx], ventilNr, area, location, status, defectDesc, actionStatus, lastUpdated: new Date().toISOString() };
            }
            document.getElementById("saveBtn").removeAttribute("data-edit-id");
            document.getElementById("saveBtn").innerHTML = "💾 Spara ventil";
        } else {
            const newVentil = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                ventilNr, area, location, status, defectDesc, extraFinds: [], actionStatus, lastUpdated: new Date().toISOString()
            };
            ventilData.push(newVentil);
        }
        clearForm();
        saveToStorage();
        renderTable();
        updateStats();
    }

    function addExtraFind() {
        const extraText = document.getElementById("extraFind").value.trim();
        if(!extraText) { alert("Skriv in extra fynd (t.ex. brandpost, asfalt)"); return; }
        
        const editId = document.getElementById("saveBtn").getAttribute("data-edit-id");
        if(editId) {
            const vent = ventilData.find(v => v.id === editId);
            if(vent) {
                if(!vent.extraFinds) vent.extraFinds = [];
                vent.extraFinds.push(extraText);
                saveToStorage();
                renderTable();
                updateStats();
                document.getElementById("extraFind").value = "";
                alert(`Extra fynd sparat på ${vent.ventilNr}`);
                return;
            }
        }
        
        const ventilNr = prompt("Ange ventilnummer för extra fyndet:", "");
        if(ventilNr) {
            const vent = ventilData.find(v => v.ventilNr.toLowerCase() === ventilNr.toLowerCase());
            if(vent) {
                if(!vent.extraFinds) vent.extraFinds = [];
                vent.extraFinds.push(extraText);
                saveToStorage();
                renderTable();
                updateStats();
                document.getElementById("extraFind").value = "";
                alert(`Extra fynd sparat på ${vent.ventilNr}`);
            } else { alert(`Hittar ingen ventil med nr ${ventilNr}`); }
        }
    }

    function editVentilById(id) {
        const vent = ventilData.find(v => v.id === id);
        if(!vent) return;
        document.getElementById("ventilId").value = vent.ventilNr;
        document.getElementById("area").value = vent.area;
        document.getElementById("location").value = vent.location || "";
        const statusSelect = document.getElementById("statusSelect");
        const isCustom = ![...statusSelect.options].some(opt => opt.value === vent.status);
        if(isCustom) {
            statusSelect.value = "(Egen text)";
            document.getElementById("manualStatusGroup").style.display = "flex";
            document.getElementById("manualStatus").value = vent.status;
        } else {
            statusSelect.value = vent.status;
            document.getElementById("manualStatusGroup").style.display = "none";
        }
        document.getElementById("defectDesc").value = vent.defectDesc || "";
        document.getElementById("actionStatus").value = vent.actionStatus;
        document.getElementById("saveBtn").setAttribute("data-edit-id", id);
        document.getElementById("saveBtn").innerHTML = "✏️ Uppdatera ventil";
        document.getElementById("formPanel").scrollIntoView({ behavior: "smooth" });
    }

    function deleteVentilById(id) {
        if(confirm("Ta bort denna ventil?")) {
            ventilData = ventilData.filter(v => v.id !== id);
            saveToStorage();
            renderTable();
            updateStats();
            const editId = document.getElementById("saveBtn").getAttribute("data-edit-id");
            if(editId === id) clearForm();
        }
    }

    function clearForm() {
        document.getElementById("ventilId").value = "";
        document.getElementById("area").value = "Tullinge";
        document.getElementById("location").value = "";
        document.getElementById("statusSelect").value = "Trasig - snurrar bara";
        document.getElementById("manualStatusGroup").style.display = "none";
        document.getElementById("manualStatus").value = "";
        document.getElementById("defectDesc").value = "";
        document.getElementById("actionStatus").value = "Ej åtgärdad";
        document.getElementById("saveBtn").removeAttribute("data-edit-id");
        document.getElementById("saveBtn").innerHTML = "💾 Spara ventil";
    }

    function exportToCSV() {
        const headers = ["Ventilnummer","Område","Plats","Status","Notering","Extra fynd","Åtgärd","Senast uppdaterad"];
        const rows = ventilData.map(v => [
            v.ventilNr, v.area, v.location || "", v.status, v.defectDesc || "",
            (v.extraFinds || []).join("; "), v.actionStatus, new Date(v.lastUpdated).toLocaleString()
        ]);
        const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ventilprogram2026_botkyrka.csv";
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function loadExampleData() {
        if(confirm("Lägg till fler exempelventiler?")) {
            const extras = [
                { id: Date.now()+"ex1", ventilNr: "VAV55555", area: "Vårsta", location: "Vårstavägen 5", status: "Betäckning trasig - Måste höja hela betäckning", defectDesc: "Locket sänkt, vatten samlas", extraFinds: [], actionStatus: "Ej åtgärdad", lastUpdated: new Date().toISOString() },
                { id: Date.now()+"ex2", ventilNr: "VAV77777", area: "Tullinge", location: "Malmsjövägen", status: "Hittar ej ventil", defectDesc: "Enligt karta här men ingen ventil hittad", extraFinds: ["Brandpost saknas"], actionStatus: "Planerad", lastUpdated: new Date().toISOString() }
            ];
            ventilData.push(...extras);
            saveToStorage();
            renderTable();
            updateStats();
        }
    }

    function handleSearch() { currentSearchTerm = document.getElementById("searchInput").value.toLowerCase(); renderTable(); }
    function handleAreaFilter() { currentAreaFilter = document.getElementById("areaFilter").value; renderTable(); }

    window.onload = () => {
        loadFromStorage();
        document.getElementById("saveBtn").addEventListener("click", saveVentil);
        document.getElementById("clearFormBtn").addEventListener("click", clearForm);
        document.getElementById("addExtraBtn").addEventListener("click", addExtraFind);
        document.getElementById("exportCsvBtn").addEventListener("click", exportToCSV);
        document.getElementById("importExampleBtn").addEventListener("click", loadExampleData);
        document.getElementById("searchInput").addEventListener("input", handleSearch);
        document.getElementById("areaFilter").addEventListener("change", handleAreaFilter);
    };
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
</script>
